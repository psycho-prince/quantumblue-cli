name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: quantumblue-cli/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: quantumblue-cli

    - name: Build
      run: npm run build
      working-directory: quantumblue-cli

    - name: Run Tests
      run: npm test
      working-directory: quantumblue-cli
